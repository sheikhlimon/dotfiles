<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Local font directories -->
  <dir>~/.local/share/fonts</dir>
  <dir>/usr/share/fonts</dir>

  <!-- Default sans-serif -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>sans-serif</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Noto Sans</string>
    </edit>
  </match>

  <!-- Default serif -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>serif</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>Noto Serif</string>
    </edit>
  </match>

  <!-- Default monospace -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>monospace</string>
    </test>
    <edit binding="strong" mode="assign" name="family">
      <string>VictorMono Nerd Font</string>
    </edit>
  </match>

  <!-- Force Noto Sans Bengali for Bengali script -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>bn</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Noto Sans Bengali</string>
    </edit>
  </match>

  <!-- Improve rendering for lighter appearance -->
  <match target="font">
    <edit mode="assign" name="hinting">
      <bool>true</bool>
    </edit>
    <edit mode="assign" name="hintstyle">
      <const>hintslight</const>
    </edit>
    <edit mode="assign" name="antialias">
      <bool>true</bool>
    </edit>
    <edit mode="assign" name="rgba">
      <const>rgb</const>
    </edit>
  </match>

  <!-- UI font aliases -->
  <alias>
    <family>system-ui</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>ui-monospace</family>
    <default>
      <family>monospace</family>
    </default>
  </alias>

  <alias>
    <family>-apple-system</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>BlinkMacSystemFont</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>

</fontconfig>

